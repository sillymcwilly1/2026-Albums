<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Album Rater</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div id="app">
    <header>
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="11" width="4" height="6" rx="2" fill="#1DB954"/>
          <rect x="6" y="7" width="4" height="14" rx="2" fill="#1DB954"/>
          <rect x="12" y="3" width="4" height="22" rx="2" fill="#1DB954"/>
          <rect x="18" y="7" width="4" height="14" rx="2" fill="#1DB954"/>
          <rect x="24" y="11" width="4" height="6" rx="2" fill="#1DB954"/>
        </svg>
        <span>ALBUM <strong>RATER</strong></span>
      </div>
      <nav>
        <button onclick="showPage('search')" class="nav-btn active" id="nav-search">Search</button>
        <button onclick="showPage('rankings')" class="nav-btn" id="nav-rankings">My Rankings</button>
        <button onclick="showPage('replay')" class="nav-btn" id="nav-replay">Replay Tracker</button>
      </nav>
    </header>

    <!-- Search Page -->
    <div id="page-search" class="page">
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search for an album..." />
        <button onclick="searchAlbums()">Search</button>
      </div>

      <div id="search-results-section" class="hidden">
        <p class="section-label">Search Results</p>
        <div id="search-results" class="album-grid"></div>
      </div>

      <div id="recommendations-section" class="hidden">
        <p class="section-label">Recommended for You — 2025 & 2026</p>
        <div id="recommendations-results" class="album-grid"></div>
      </div>

      <div id="recent-section">
        <p class="section-label">Recently Played</p>
        <div id="recent-results" class="album-grid"></div>
      </div>
    </div>

    <!-- Rankings Page -->
    <div id="page-rankings" class="page hidden">
      <h2>My Rankings</h2>
      <div class="charts-section">
        <div class="chart-card">
          <h3>Albums by Rating</h3>
          <canvas id="barChart"></canvas>
        </div>
        <div class="chart-card">
          <h3>Release Year vs. Rating</h3>
          <canvas id="scatterChart"></canvas>
        </div>
      </div>
      <div id="rankings-list"></div>
    </div>

    <!-- Replay Tracker Page -->
    <div id="page-replay" class="page hidden">
      <h2>Replay Tracker</h2>
      <p class="section-sublabel">Every time you open the app, your recent Spotify plays are logged. This chart grows over time.</p>
      <div class="chart-card" style="margin-bottom:24px">
        <h3>Most Replayed Albums (All Time)</h3>
        <canvas id="replayBarChart"></canvas>
      </div>
      <div class="chart-card">
        <h3>Play Timeline</h3>
        <canvas id="replayLineChart"></canvas>
      </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <button class="close-btn" onclick="closeModal()">✕</button>
        <div id="modal-body"></div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
