<!DOCTYPE html>
<html>
<head><title>Generate Icon</title></head>
<body>
<canvas id="c" width="512" height="512"></canvas>
<br><button onclick="dl()">Download icon.png</button>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const S = 512;

// Background
ctx.fillStyle = '#0e0e0b';
ctx.fillRect(0, 0, S, S);

// Rounded corners feel (iOS crops anyway but looks clean)
// Subtle radial glow
const glow = ctx.createRadialGradient(S*0.3, S*0.3, 0, S*0.3, S*0.3, S*0.7);
glow.addColorStop(0, 'rgba(29,185,84,0.12)');
glow.addColorStop(1, 'transparent');
ctx.fillStyle = glow;
ctx.fillRect(0, 0, S, S);

// MCM starburst top-right corner
ctx.save();
ctx.fillStyle = 'rgba(29,185,84,0.1)';
const cx = S - 60, cy = 60, r = 100, rays = 18;
for (let i = 0; i < rays; i++) {
  const a1 = (i / rays) * Math.PI * 2;
  const a2 = a1 + Math.PI / rays;
  ctx.beginPath();
  ctx.moveTo(cx + Math.cos(a1)*r, cy + Math.sin(a1)*r);
  ctx.lineTo(cx + Math.cos(a2)*r*0.35, cy + Math.sin(a2)*r*0.35);
  ctx.lineTo(cx + Math.cos(a1 + Math.PI*2/rays)*r, cy + Math.sin(a1 + Math.PI*2/rays)*r);
  ctx.closePath();
  ctx.fill();
}
ctx.restore();

// MCM atomic dots bottom-left
ctx.fillStyle = 'rgba(29,185,84,0.15)';
for (let row = 0; row < 4; row++) {
  for (let col = 0; col < 4; col++) {
    ctx.beginPath();
    ctx.arc(48 + col*20, S - 48 - row*20, 4, 0, Math.PI*2);
    ctx.fill();
  }
}

// Waveform — centered, large
const bars = [18, 36, 56, 72, 90, 72, 56, 36, 18];
const barW = 28;
const gap = 14;
const totalW = bars.length * barW + (bars.length - 1) * gap;
const startX = (S - totalW) / 2;
const midY = S * 0.42;

bars.forEach(function(h, i) {
  const x = startX + i * (barW + gap);
  // Gradient per bar — tallest bars brightest
  const intensity = h / 90;
  ctx.fillStyle = `rgba(29, ${Math.round(100 + intensity*85)}, ${Math.round(40 + intensity*44)}, 1)`;
  ctx.beginPath();
  ctx.roundRect(x, midY - h/2, barW, h, 8);
  ctx.fill();
});

// Green accent line under waveform
ctx.fillStyle = '#1DB954';
ctx.fillRect(startX, midY + 58, totalW, 3);

// "AR" monogram below — serif italic
ctx.fillStyle = '#f0efe8';
ctx.font = 'italic 700 96px Georgia, serif';
ctx.textAlign = 'center';
ctx.fillText('AR', S/2, S * 0.75);

// Small dot accent
ctx.fillStyle = '#1DB954';
ctx.beginPath();
ctx.arc(S/2 + 68, S * 0.75 - 72, 10, 0, Math.PI*2);
ctx.fill();

function dl() {
  const a = document.createElement('a');
  a.download = 'icon.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
